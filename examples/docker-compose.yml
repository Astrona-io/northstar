version: '3.8'

# Northstar CMDB - Public Pre-Built Local Environment Orchestration.
# This compose file pulls pre-built multi-architecture container images directly
# from the GitHub Container Registry (ghcr.io) for instant offline-ready local evaluation.

services:
  northstar-backend:
    image: ghcr.io/astrona-io/northstar-backend:latest
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=/app/data/cmdb.db
      - OTEL_ENABLED=false
    volumes:
      # Persist SQLite database file locally on your host machine
      - backend-data:/app/data
    networks:
      - northstar-network
    restart: always

  northstar-frontend:
    image: ghcr.io/astrona-io/northstar-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8000/api
      # Let the Nuxt server-side requests talk directly to the backend container over internal DNS
      - NUXT_API_BASE_INTERNAL=http://northstar-backend:8000/api
    depends_on:
      - northstar-backend
    networks:
      - northstar-network
    restart: always

volumes:
  backend-data:

networks:
  northstar-network:
    driver: bridge
