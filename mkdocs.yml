site_name: Northstar Developer Docs
site_url: https://astrona.io/northstar
site_author: Astrona Technical Writing Team
site_description: High-fidelity Diátaxis-compliant developer documentation for the Northstar CMDB platform.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: slate
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: slate
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - attr_list
  - md_in_html

nav:
  - Welcome: index.md
  - Tutorials:
      - Getting Started: tutorials/getting-started.md
  - How-To Guides:
      - Custom Fields & Ingest: how-to/custom-fields.md
  - Reference:
      - API Endpoint Reference: reference/api-spec.md
  - Explanation:
      - System Architecture: explanation/architecture.md
