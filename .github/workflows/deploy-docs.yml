name: Deploy Documentation

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Build and Deploy Documentation
        run: |
          # mkdocs gh-deploy automatically builds the documentation and pushes the
          # static output directly to the 'gh-pages' branch for GitHub Pages hosting.
          mkdocs gh-deploy --force --clean
