name: Test Suite

# Triggers the test suite on every pull request and push to the main branch
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ==========================================
  # JOB 1: Code Verification & Automated Tests
  # ==========================================
  test:
    name: Run Full-Stack Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Backend Test Pipeline
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run Backend Tests
        run: |
          cd backend
          go test -v ./...

      # Frontend Test Pipeline
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Vitest Unit Tests
        run: |
          cd frontend
          npm run test

  # ==========================================
  # JOB 2: Parallel Backend Container Build Check
  # ==========================================
  build-check-backend:
    name: Validate Backend Container (Dry-Run)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Set up QEMU for multi-architecture emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx (creates a multi-arch container builder context)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Validate Go Backend container compilation (Dry-run without push)
      - name: Test-Build Backend Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # JOB 3: Parallel Frontend Container Build Check
  # ==========================================
  build-check-frontend:
    name: Validate Frontend Container (Dry-Run)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Set up QEMU for multi-architecture emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx (creates a multi-arch container builder context)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Validate Nuxt Frontend container compilation (Dry-run without push)
      - name: Test-Build Frontend Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
