name: Ship OCI Containers to GHCR

# Triggers the release pipeline exclusively on tag pushes (e.g. v0.0.1, v1.0.0-rc1)
on:
  push:
    tags:
      - 'v*'

# Grant write permissions to push to GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # JOB 1: Pre-Release Automated Tests
  # ==========================================
  test:
    name: Run Pre-Release Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Backend Test Pipeline
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run Backend Tests
        run: |
          cd backend
          go test -v ./...

      # Frontend Test Pipeline
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Vitest Unit Tests
        run: |
          cd frontend
          npm run test

  # ==========================================
  # JOB 2: Multi-Arch Build & Push to GHCR
  # ==========================================
  build-and-push:
    name: Build and Push Multi-Arch Images
    runs-on: ubuntu-latest
    # Enforces that build-and-push ONLY triggers if the pre-release tests pass successfully!
    needs: [test]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Set up QEMU for multi-architecture emulation (enables arm64 builds on amd64 runners)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx (creates a multi-arch container builder context)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase repository name for GHCR name compatibility
      - name: Prepare GHCR Lowercase Image Names
        id: prep
        run: |
          # GHCR strictly requires package names to be entirely lowercase
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=${REPO_OWNER}" >> $GITHUB_OUTPUT

      # Build and Push Go Backend Multi-Arch Image (amd64 + arm64)
      - name: Build & Push Go Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/northstar-backend:latest
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/northstar-backend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and Push Nuxt Frontend Multi-Arch Image (amd64 + arm64)
      - name: Build & Push Nuxt Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/northstar-frontend:latest
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/northstar-frontend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
